<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGWI Login</title>
    <link rel="stylesheet" href="assets/css/auth.css">
</head>

<body>
    <div class="box">

        <!-- LOGIN -->
        <div id="loginBox">
            <h2>Login</h2>

            <form method="POST" action="auth/Login.php">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Masuk</button>
            </form>

            <p id="loginMsg" style="color:red;"></p>

            <span class="link" onclick="showRegister()">Belum punya akun? Daftar</span>
        </div>

        <!-- REGISTER -->
        <div id="registerBox" class="hidden">
            <h2>Register</h2>

            <input id="regUser" placeholder="Username">
            <input id="regNoHp" placeholder="No. Hp" maxlength="13">
            <input id="regPass" type="password" placeholder="Password">

            <button onclick="register()">Daftar</button>

            <p id="regMsg"></p>

            <span class="link" onclick="showLogin()">← Kembali ke Login</span>
        </div>

    </div>

    <script src="assets/js/script.js"></script>
    <script>
        // Tampilkan pesan error dari query string (?error=...)
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if(error){
            document.getElementById('loginMsg').textContent = error;
            // bersihkan URL biar gak nyangkut pas refresh
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>

</body>

</html>
